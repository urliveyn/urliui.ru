<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass Bottom Sheet</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-sheet: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.15);
            --overlay-color: rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-active: rgba(10, 132, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* Главный экран */
        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* Оверлей */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-color);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
            z-index: 998;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 95vh;
            background: var(--bg-sheet);
            /* Граница только СВЕРХУ */
            border-top: 1px solid var(--border-color);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 999;
            transform: translateY(101%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.active {
            transform: translateY(100%);
        }

        .bottom-sheet.dragging {
            transition: none;
        }

        /* Зона хендла для перетаскивания */
        .sheet-header {
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
        }

        .sheet-header:active {
            cursor: grabbing;
        }

        /* СВГ Полосочка, которая гнется */
        .drag-svg {
            width: 60px;
            height: 20px;
        }

        .drag-path {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 5;
            stroke-linecap: round;
            transition: d 0.2s ease-out; /* Плавный возврат в дефолт */
        }

        .bottom-sheet.dragging .drag-path {
            transition: none; /* Мгновенный отклик при перетаскивании */
        }

        /* Контент */
        .sheet-content {
            padding: 10px 24px 40px 24px;
            flex: 1;
            overflow-y: auto;
        }

        .sheet-content h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .sheet-content p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Элементы без бордеров */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }

        .settings-item span {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        /* LIQUID GLASS SWITCHER */
        .liquid-switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 32px;
        }

        .liquid-switch input {
            opacity: 0; width: 0; height: 0;
        }

        .liquid-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            box-shadow: 
                inset 0 1px 3px rgba(0, 0, 0, 0.4),
                inset 0 -1px 1px rgba(255, 255, 255, 0.05);
            transition: background 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        /* Капля (Жидкое стекло) */
        .liquid-slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 3px;
            bottom: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            
            /* Эффект объема стеклянной линзы */
            box-shadow: 
                0 4px 10px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.4);
            
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s;
            z-index: 2;
        }

        /* Блик на стекле */
        .liquid-slider:after {
            position: absolute;
            content: "";
            height: 8px;
            width: 14px;
            left: 9px;
            top: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50% / 40%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 3;
            pointer-events: none;
        }

        /* Состояние "Включено" */
        input:checked + .liquid-slider {
            background: var(--glass-active);
            backdrop-filter: blur(4px);
        }

        input:checked + .liquid-slider:before {
            transform: translateX(22px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 4px 12px rgba(10, 132, 255, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.6),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
        }

        input:checked + .liquid-slider:after {
            transform: translateX(22px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <button id="open-sheet-btn" class="btn-primary">Открыть меню</button>
    </div>

    <div id="sheet-overlay" class="sheet-overlay"></div>

    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <svg class="drag-svg" viewBox="0 0 60 20">
                <path id="drag-path" class="drag-path" d="M 5 10 Q 30 10 55 10" />
            </svg>
        </div>
        <div class="sheet-content">
            <h2>Haptic & Audio</h2>
            <p>Управление интерфейсом системы.</p>
            
            <div class="settings-list">
                <div class="settings-item">
                    <span>Тактильный отклик</span>
                    <label class="liquid-switch">
                        <input type="checkbox" checked>
                        <span class="liquid-slider"></span>
                    </label>
                </div>
                <div class="settings-item">
                    <span>Пространственное аудио</span>
                    <label class="liquid-switch">
                        <input type="checkbox">
                        <span class="liquid-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('open-sheet-btn');
        const sheet = document.getElementById('bottom-sheet');
        const overlay = document.getElementById('sheet-overlay');
        const dragHandle = document.querySelector('.sheet-header');
        const dragPath = document.getElementById('drag-path');

        let isDragging = false;
        let startY = 0;
        let initialYForBending = 0;
        let currentHeight = 0; 
        const sheetMaxHeight = window.innerHeight * 0.95;
        const sheetMidHeight = window.innerHeight * 0.50;

        function openSheet() {
            sheet.classList.add('active');
            overlay.classList.add('active');
            setSheetHeight(sheetMidHeight);
        }

        function closeSheet() {
            sheet.classList.remove('active');
            overlay.classList.remove('active');
            sheet.style.transform = 'translateY(101%)';
            resetBlurp();
        }

        function setSheetHeight(height) {
            currentHeight = height;
            const translateY = window.innerHeight - height;
            sheet.style.transform = `translateY(${translateY}px)`;
        }

        // Возвращает изгиб полоски в дефолтное горизонтальное положение
        function resetBlurp() {
            dragPath.setAttribute('d', 'M 5 10 Q 30 10 55 10');
        }

        function startDrag(e) {
            isDragging = true;
            sheet.classList.add('dragging');
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startY = clientY;
            initialYForBending = clientY;
            
            const matrix = window.getComputedStyle(sheet).transform;
            if (matrix !== 'none') {
                const translateY = parseFloat(matrix.split(',')[5]);
                currentHeight = window.innerHeight - translateY;
            }
        }

        function onDrag(e) {
            if (!isDragging) return;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Расчет изменения высоты шторки
            const deltaY = startY - clientY; 
            let newHeight = currentHeight + deltaY;

            if (newHeight > sheetMaxHeight) {
                newHeight = sheetMaxHeight + (newHeight - sheetMaxHeight) * 0.15;
            }
            setSheetHeight(newHeight);
            startY = clientY;

            // Расчет изгиба полоски (Интерактивный Blurp эффект)
            // Интенсивность зависит от разницы начального тача и движения пальца
            const totalDeltaY = clientY - initialYForBending;
            // Лимитируем изгиб в пределах от -8 до 28 координат SVG
            let bend = 10 + (totalDeltaY * 0.25);
            bend = Math.max(-5, Math.min(25, bend)); 
            
            dragPath.setAttribute('d', `M 5 10 Q 30 ${bend} 55 10`);
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            sheet.classList.remove('dragging');
            resetBlurp(); // Плавно возвращаем полоску в ровную линию

            // Фиксация в контрольных точках (Snapping)
            if (currentHeight > (sheetMidHeight + sheetMaxHeight) / 2) {
                setSheetHeight(sheetMaxHeight);
            } else if (currentHeight > sheetMidHeight / 1.4) {
                setSheetHeight(sheetMidHeight);
            } else {
                closeSheet();
            }
        }

        // События
        openBtn.addEventListener('click', openSheet);
        overlay.addEventListener('click', closeSheet);

        dragHandle.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', onDrag, { passive: false });
        window.addEventListener('touchend', endDrag);

        dragHandle.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', endDrag);
    </script>
</body>
</html>
