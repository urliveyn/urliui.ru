<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solid Bottom Sheet</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --accent-color: #007aff;
            --switch-bg: #e9e9ea;
            --switch-green: #34c759;
            --border-color: #222222;
            --overlay-color: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f5f7;
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
        }

        /* Главный контейнер и кнопка */
        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .btn-primary {
            background: var(--text-color);
            color: #fff;
            border: none;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* Затемнение заднего фона */
        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.3s;
            z-index: 998;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Bottom Sheet контейнер */
        .bottom-sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 95vh;
            background: var(--bg-color);
            border-top: 2px solid var(--border-color);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 999;
            transform: translateY(101%);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.active {
            transform: translateY(100%);
        }

        .bottom-sheet.dragging {
            transition: none; /* Отключаем анимации при drag-событиях для плавности */
        }

        /* Область для захвата (хендл) */
        .sheet-header {
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
        }

        .sheet-header:active {
            cursor: grabbing;
        }

        .sheet-drag-handle {
            width: 40px;
            height: 5px;
            background: #ccc;
            border-radius: 3px;
        }

        /* Контент внутри шторки */
        .sheet-content {
            padding: 0 24px 40px 24px;
            flex: 1;
            overflow-y: auto;
        }

        .sheet-content h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .sheet-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Элементы настроек */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f9f9f9;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
        }

        .settings-item span {
            font-size: 16px;
            font-weight: 500;
        }

        /* iOS Switcher */
        .ios-switch {
            position: relative;
            display: inline-block;
            width: 51px;
            height: 31px;
        }

        .ios-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .ios-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-bg);
            transition: background-color 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 31px;
        }

        .ios-slider:before {
            position: absolute;
            content: "";
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        input:checked + .ios-slider {
            background-color: var(--switch-green);
        }

        input:checked + .ios-slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <button id="open-sheet-btn" class="btn-primary">Открыть Bottom Sheet</button>
    </div>

    <div id="sheet-overlay" class="sheet-overlay"></div>

    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <div class="sheet-drag-handle"></div>
        </div>
        <div class="sheet-content">
            <h2>Настройки</h2>
            <p>Смахните вниз, чтобы закрыть, или потяните вверх для полного экрана.</p>
            
            <div class="settings-list">
                <div class="settings-item">
                    <span>Включить уведомления</span>
                    <label class="ios-switch">
                        <input type="checkbox" checked>
                        <span class="ios-slider"></span>
                    </label>
                </div>
                <div class="settings-item">
                    <span>Режим разработчика</span>
                    <label class="ios-switch">
                        <input type="checkbox">
                        <span class="ios-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('open-sheet-btn');
        const sheet = document.getElementById('bottom-sheet');
        const overlay = document.getElementById('sheet-overlay');
        const dragHandle = document.querySelector('.sheet-header');

        let isDragging = false;
        let startY = 0;
        let currentHeight = 0; 
        const sheetMaxHeight = window.innerHeight * 0.95;
        const sheetMidHeight = window.innerHeight * 0.50;

        function openSheet() {
            sheet.classList.add('active');
            overlay.classList.add('active');
            setSheetHeight(sheetMidHeight);
        }

        function closeSheet() {
            sheet.classList.remove('active');
            overlay.classList.remove('active');
            sheet.style.transform = 'translateY(101%)';
        }

        function setSheetHeight(height) {
            currentHeight = height;
            const translateY = window.innerHeight - height;
            sheet.style.transform = `translateY(${translateY}px)`;
        }

        function startDrag(e) {
            isDragging = true;
            sheet.classList.add('dragging');
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const matrix = window.getComputedStyle(sheet).transform;
            if (matrix !== 'none') {
                const translateY = parseFloat(matrix.split(',')[5]);
                currentHeight = window.innerHeight - translateY;
            }
        }

        function onDrag(e) {
            if (!isDragging) return;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = startY - clientY; 
            let newHeight = currentHeight + deltaY;

            // Rubber-band эффект при превышении максимума
            if (newHeight > sheetMaxHeight) {
                newHeight = sheetMaxHeight + (newHeight - sheetMaxHeight) * 0.2;
            }

            setSheetHeight(newHeight);
            startY = clientY;
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            sheet.classList.remove('dragging');

            // Snapping (магнитные точки фиксации)
            if (currentHeight > (sheetMidHeight + sheetMaxHeight) / 2) {
                setSheetHeight(sheetMaxHeight);
            } else if (currentHeight > sheetMidHeight / 2) {
                setSheetHeight(sheetMidHeight);
            } else {
                closeSheet();
            }
        }

        openBtn.addEventListener('click', openSheet);
        overlay.addEventListener('click', closeSheet);

        // Touch события для мобилок
        dragHandle.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', onDrag, { passive: false });
        window.addEventListener('touchend', endDrag);

        // Mouse события для десктопа
        dragHandle.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', endDrag);
    </script>
</body>
</html>
